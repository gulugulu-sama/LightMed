# 数据卷定义
volumes:
  # 移除不再需要的bind挂载卷，直接使用目录映射
  
  medical_rag_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs
  
  ollama_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./docker_data/ollama_models
  
  # redis_data:
  #   driver: local
  
  # postgres_data:
  #   driver: local

# 网络定义
networks:
  medical-rag-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16 